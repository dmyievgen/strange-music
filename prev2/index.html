<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>strange-music-mobile</title>
  <link rel="icon" href="./icon.png" type="image/png">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #07090d;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f3f4f6;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.03), transparent 22%),
        radial-gradient(circle at 50% 50%, rgba(80,140,255,0.05), transparent 40%),
        linear-gradient(180deg, #0b0e14 0%, #05070a 100%);
    }
    .veil {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06), transparent 24%),
        radial-gradient(circle at 20% 20%, rgba(130, 170, 255, 0.05), transparent 34%),
        radial-gradient(circle at 80% 75%, rgba(190, 120, 255, 0.05), transparent 34%);
      mix-blend-mode: screen;
    }
    .wrap {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 24px 22px;
      border-radius: 24px;
      background: rgba(8, 10, 16, 0.22);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255,255,255,0.08);
      width: min(92vw, 420px);
      margin-top: 34vh;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 12px rgba(255,255,255,0.08);
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      min-width: 148px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      background: #f3f4f6;
      color: #111827;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }
    button:active { transform: translateY(1px); }
    button.stop { background: #ef4444; color: white; }
    .hint { margin-top: 16px; font-size: 13px; opacity: 0.72; }
    .status { margin-top: 10px; font-size: 12px; opacity: 0.65; min-height: 1.2em; }
    body:fullscreen .wrap,
    body:-webkit-full-screen .wrap,
    html:fullscreen .wrap,
    html:-webkit-full-screen .wrap {
      opacity: 0;
      pointer-events: none;
    }
    @media (max-width: 680px) {
      .wrap { margin-top: 30vh; padding: 20px 18px; }
      button { min-width: 132px; font-size: 18px; padding: 15px 22px; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="veil"></div>
  <div class="wrap" id="wrap">
    <div class="controls">
      <button id="toggleBtn">Start</button>
      <button id="fsBtn">Fullscreen</button>
    </div>
  </div>

  <script>
    const SAMPLE_RATE = 44100;
    const BPM = 22;
    const BEAT_SEC = 60 / BPM;

    const ATTACK_MS = 215.0;
    const RELEASE_MS = 2120.0;
    const MASTER_AMP = 0.125;
    const RELEASE_CURVE_POWER = 2.15;

    const ATTACK_STEP = 1 / Math.max(1, Math.floor(SAMPLE_RATE * ATTACK_MS / 1000));
    const RELEASE_STEP = 1 / Math.max(1, Math.floor(SAMPLE_RATE * RELEASE_MS / 1000));

    const C_MAJOR_OFFSETS = [0, 2, 4, 5, 7, 9, 11];
    const BASS_RANGE = [43, 60];
    const ALTO_RANGE = [55, 72];
    const SOP_RANGE = [60, 79];

    const CHORDS = {
      I: [0, 2, 4],
      ii: [1, 3, 5],
      iii: [2, 4, 6],
      IV: [3, 5, 0],
      V: [4, 6, 1],
      vi: [5, 0, 2],
    };

    const CHORD_ROOT = { I: 0, ii: 1, iii: 2, IV: 3, V: 4, vi: 5 };
    const CHORD_TRANSITIONS = {
      I: ["I", "ii", "IV", "V", "vi"],
      ii: ["V", "IV", "vi"],
      iii: ["vi", "IV"],
      IV: ["I", "ii", "V"],
      V: ["I", "vi"],
      vi: ["ii", "IV", "V", "I"],
    };

    const MOBILE = /Android|iPhone|iPad|iPod|Mobile|Opera Mini|IEMobile/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && window.innerWidth <= 1024);
    const REDUCED_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const DEVICE_PROFILE = {
      mobile: MOBILE,
      reducedMotion: REDUCED_MOTION,
      animationIntervalMs: MOBILE ? 50 : 33,
      maxDpr: MOBILE ? 1 : 1.25,
      canvasQuality: MOBILE ? 0.9 : 1,
      reverbSeconds: MOBILE ? 2.4 : 5.2,
      enableReverb: !MOBILE,
      enablePanNudges: !MOBILE,
      visualThrottleWhenHidden: true,
    };

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function weightedChoice(items, weights) {
      const total = weights.reduce((a, b) => a + b, 0);
      if (total <= 0) return items[Math.floor(Math.random() * items.length)];
      let r = Math.random() * total;
      let acc = 0;
      for (let i = 0; i < items.length; i++) {
        acc += weights[i];
        if (r <= acc) return items[i];
      }
      return items[items.length - 1];
    }

    function nearestCandidates(candidates, prev, maxItems = 7) {
      return [...candidates].sort((a, b) => Math.abs(a - prev) - Math.abs(b - prev)).slice(0, maxItems);
    }

    function intervalClass(a, b) { return Math.abs(a - b) % 12; }

    function degreeToAllMidisInRange(scaleDegree, low, high) {
      const out = [];
      const semitone = C_MAJOR_OFFSETS[scaleDegree % 7];
      for (let octave = -1; octave < 10; octave++) {
        const midi = 12 * octave + semitone;
        if (midi >= low && midi <= high) out.push(midi);
      }
      return out;
    }

    function chordToneMidis(chordName, low, high) {
      const set = new Set();
      for (const deg of CHORDS[chordName]) {
        for (const midi of degreeToAllMidisInRange(deg, low, high)) set.add(midi);
      }
      return [...set].sort((a, b) => a - b);
    }

    function scaleMidisInRange(low, high) {
      const set = new Set();
      for (let deg = 0; deg < 7; deg++) {
        for (const midi of degreeToAllMidisInRange(deg, low, high)) set.add(midi);
      }
      return [...set].sort((a, b) => a - b);
    }

    const BASS_SCALE = scaleMidisInRange(...BASS_RANGE);
    const ALTO_SCALE = scaleMidisInRange(...ALTO_RANGE);
    const SOP_SCALE = scaleMidisInRange(...SOP_RANGE);

    function nearestScaleNote(midi, scale) {
      let best = scale[0];
      let bestDist = Math.abs(best - midi);
      for (const x of scale) {
        const d = Math.abs(x - midi);
        if (d < bestDist) {
          best = x;
          bestDist = d;
        }
      }
      return best;
    }

    function shiftByScaleSteps(midi, steps, scale) {
      const base = nearestScaleNote(midi, scale);
      const idx = scale.indexOf(base);
      const idx2 = Math.max(0, Math.min(scale.length - 1, idx + steps));
      return scale[idx2];
    }

    function maybePassingTone(prevMidi, targetMidi, voiceScale) {
      if (prevMidi === targetMidi) return null;
      const prevBase = nearestScaleNote(prevMidi, voiceScale);
      const targetBase = nearestScaleNote(targetMidi, voiceScale);
      const prevIdx = voiceScale.indexOf(prevBase);
      const targetIdx = voiceScale.indexOf(targetBase);
      if (Math.abs(targetIdx - prevIdx) < 2) return null;
      const step = targetIdx > prevIdx ? 1 : -1;
      return voiceScale[prevIdx + step];
    }

    function maybeSuspension(prevMidi, targetMidi, lowerMidi) {
      const heldIc = intervalClass(prevMidi, lowerMidi);
      const targetIc = intervalClass(targetMidi, lowerMidi);
      const heldDissonantish = [1, 2, 5, 6, 10, 11].includes(heldIc);
      const targetConsonant = [3, 4, 7, 8, 9].includes(targetIc);
      if (heldDissonantish && targetConsonant && prevMidi !== targetMidi) return prevMidi;
      return null;
    }

    function contraryMotionBonus(candidate, prevMidi, lowerPrev, lowerNow) {
      const ownMotion = candidate - prevMidi;
      const lowerMotion = lowerNow - lowerPrev;
      if (ownMotion === 0 || lowerMotion === 0) return 1.0;
      if (ownMotion * lowerMotion < 0) return 1.25;
      return 0.9;
    }

    function chooseSequencePattern() {
      const patterns = [
        { bass: [0, 1], alto: [1, 0], soprano: [2, 1] },
        { bass: [-1, 0], alto: [0, 1], soprano: [1, 0] },
        { bass: [0, 0], alto: [1, -1], soprano: [1, 0] },
        { bass: [0, 1], alto: [0, 1], soprano: [1, 2] },
        { bass: [0, -1], alto: [1, 0], soprano: [2, 1] },
      ];
      return patterns[Math.floor(Math.random() * patterns.length)];
    }

    function createImpulseResponse(audioContext, seconds = 2.4, decay = 3.0) {
      const length = Math.floor(audioContext.sampleRate * seconds);
      const impulse = audioContext.createBuffer(2, length, audioContext.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) {
          const t = i / length;
          const env = Math.pow(1 - t, decay);
          data[i] = (Math.random() * 2 - 1) * env * (0.72 - t * 0.24);
        }
      }
      return impulse;
    }

    function setupAmbientFX(audioContext) {
      const input = audioContext.createGain();
      input.gain.value = 1.0;

      const preHighCut = audioContext.createBiquadFilter();
      preHighCut.type = 'lowpass';
      preHighCut.frequency.value = DEVICE_PROFILE.mobile ? 1600 : 1900;
      preHighCut.Q.value = 0.18;

      const lowWarmth = audioContext.createBiquadFilter();
      lowWarmth.type = 'lowshelf';
      lowWarmth.frequency.value = 190;
      lowWarmth.gain.value = DEVICE_PROFILE.mobile ? 2.5 : 4.2;

      const dryGain = audioContext.createGain();
      dryGain.gain.value = DEVICE_PROFILE.mobile ? 0.82 : 0.56;

      const masterTone = audioContext.createBiquadFilter();
      masterTone.type = 'lowpass';
      masterTone.frequency.value = DEVICE_PROFILE.mobile ? 1500 : 1725;
      masterTone.Q.value = 0.15;

      const master = audioContext.createGain();
      master.gain.value = DEVICE_PROFILE.mobile ? 0.84 : 0.74;

      const panner = audioContext.createStereoPanner();
      panner.pan.value = 0;

      input.connect(preHighCut);
      preHighCut.connect(lowWarmth);

      let wetGain = null;
      let convolver = null;
      if (DEVICE_PROFILE.enableReverb) {
        const wetSend = audioContext.createGain();
        wetSend.gain.value = 0.34;
        dryGain.gain.value = 0.60;
        convolver = audioContext.createConvolver();
        convolver.buffer = createImpulseResponse(audioContext, DEVICE_PROFILE.reverbSeconds, 3.4);
        wetGain = audioContext.createGain();
        wetGain.gain.value = 0.34;
        lowWarmth.connect(wetSend);
        wetSend.connect(convolver);
        convolver.connect(wetGain);
        wetGain.connect(masterTone);
      }

      lowWarmth.connect(dryGain);
      dryGain.connect(masterTone);
      masterTone.connect(master);
      master.connect(panner).connect(audioContext.destination);

      const motion = { intervalId: null, targetPan: 0 };
      function schedulePanMotion() {
        if (DEVICE_PROFILE.mobile) return;
        const now = audioContext.currentTime;
        const baseTarget = (Math.random() * 0.7) - 0.35;
        const glideSec = 7 + Math.random() * 4;
        motion.targetPan = baseTarget;
        panner.pan.cancelScheduledValues(now);
        panner.pan.setValueAtTime(panner.pan.value, now);
        panner.pan.setTargetAtTime(baseTarget, now, glideSec * 0.42);
      }

      if (!DEVICE_PROFILE.mobile) {
        schedulePanMotion();
        motion.intervalId = setInterval(schedulePanMotion, 7000);
      }

      return {
        input,
        stop() {
          if (motion.intervalId) clearInterval(motion.intervalId);
        }
      };
    }

    const workletSource = `
      class Voice {
        constructor(freq, part) {
          this.part = part;
          this.freq = freq;
          this.phase = 0;
          this.phase2 = Math.random() * Math.PI * 2;
          this.gain = 0;
          this.targetGain = 1;
          this.alive = true;
          this.detune = (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? -1 : 1);
        }
        render(out, attackStep, releaseStep, releaseCurvePower) {
          let phase = this.phase;
          let phase2 = this.phase2;
          let gain = this.gain;
          const target = this.targetGain;
          const phaseInc = (2 * Math.PI * this.freq) / sampleRate;
          const phaseInc2 = (2 * Math.PI * (this.freq * (1 + this.detune))) / sampleRate;
          let localEnergy = 0;
          for (let i = 0; i < out.length; i++) {
            if (gain < target) gain = Math.min(target, gain + attackStep);
            else if (gain > target) {
              const releaseShape = Math.max(0.11, Math.pow(Math.max(gain, 0.00001), releaseCurvePower));
              gain = Math.max(target, gain - releaseStep * releaseShape);
            }
            const releaseTone = target === 0 ? Math.pow(Math.max(gain, 0), 0.88) : 1.0;
            const core = Math.sin(phase);
            const body = Math.sin(phase2) * 0.16;
            const sub = Math.sin(phase * 0.5) * (0.20 + 0.025 * releaseTone);
            const air = Math.sin(phase * 2) * (0.025 + 0.012 * releaseTone);
            const sample = (core * 0.66 + body + sub + air) * gain;
            out[i] += sample;
            localEnergy += Math.abs(sample);
            phase += phaseInc;
            phase2 += phaseInc2;
            if (phase >= Math.PI * 2) phase -= Math.PI * 2;
            if (phase2 >= Math.PI * 2) phase2 -= Math.PI * 2;
          }
          this.phase = phase;
          this.phase2 = phase2;
          this.gain = gain;
          if (this.targetGain === 0 && this.gain <= 0.0001) this.alive = false;
          return localEnergy / Math.max(1, out.length);
        }
      }

      class AmbientOrganProcessor extends AudioWorkletProcessor {
        constructor(options) {
          super();
          const o = options.processorOptions || {};
          this.masterAmp = o.masterAmp ?? 0.125;
          this.attackStep = o.attackStep;
          this.releaseStep = o.releaseStep;
          this.releaseCurvePower = o.releaseCurvePower;
          this.voices = new Map();
          this.partCurrentMidi = { bass: 48, alto: 64, soprano: 67 };
          this.visualState = { bass: 0, alto: 0, soprano: 0, bassMidi: 48, altoMidi: 64, sopranoMidi: 67, bassHold: 0, altoHold: 0, sopranoHold: 0, bassHueTarget: 190, altoHueTarget: 245, sopranoHueTarget: 300, bassHue: 190, altoHue: 245, sopranoHue: 300 };
          this.messageCountdown = 0;
          this.port.onmessage = (event) => {
            const msg = event.data || {};
            if (msg.type === 'setPartNote') this.setPartNote(msg.part, msg.midi);
            else if (msg.type === 'releaseAll') this.releaseAllVoices();
            else if (msg.type === 'reset') this.resetState();
          };
        }
        resetState() {
          this.voices.clear();
          this.partCurrentMidi = { bass: 48, alto: 64, soprano: 67 };
          this.visualState = { bass: 0, alto: 0, soprano: 0, bassMidi: 48, altoMidi: 64, sopranoMidi: 67, bassHold: 0, altoHold: 0, sopranoHold: 0, bassHueTarget: 190, altoHueTarget: 245, sopranoHueTarget: 300, bassHue: 190, altoHue: 245, sopranoHue: 300 };
        }
        setPartNote(part, midi) {
          const prefix = part + '_';
          let sameVoiceKey = null;
          for (const [key, voice] of this.voices.entries()) {
            if (voice.part === part && voice.targetGain > 0.5) {
              if (this.partCurrentMidi[part] === midi) {
                sameVoiceKey = key;
              } else {
                voice.targetGain = 0;
              }
            }
          }
          if (sameVoiceKey) return;
          const id = prefix + Math.random().toString(36).slice(2);
          this.voices.set(id, new Voice(440 * Math.pow(2, (midi - 69) / 12), part));
          this.partCurrentMidi[part] = midi;
        }
        releaseAllVoices() {
          for (const voice of this.voices.values()) voice.targetGain = 0;
        }
        process(inputs, outputs) {
          const output = outputs[0]?.[0];
          if (!output) return true;
          output.fill(0);
          const deadKeys = [];
          let bassEnergy = 0;
          let altoEnergy = 0;
          let sopranoEnergy = 0;
          for (const [key, voice] of this.voices.entries()) {
            const avg = voice.render(output, this.attackStep, this.releaseStep, this.releaseCurvePower);
            if (voice.part === 'bass') bassEnergy = Math.max(bassEnergy, avg);
            else if (voice.part === 'alto') altoEnergy = Math.max(altoEnergy, avg);
            else if (voice.part === 'soprano') sopranoEnergy = Math.max(sopranoEnergy, avg);
            if (!voice.alive) deadKeys.push(key);
          }
          for (const key of deadKeys) this.voices.delete(key);
          const bassOn = bassEnergy > 0.01;
          const altoOn = altoEnergy > 0.01;
          const sopranoOn = sopranoEnergy > 0.01;
          const s = this.visualState;
          s.bass = s.bass * 0.88 + Math.min(1, bassEnergy * 2.6) * 0.12;
          s.alto = s.alto * 0.88 + Math.min(1, altoEnergy * 2.6) * 0.12;
          s.soprano = s.soprano * 0.88 + Math.min(1, sopranoEnergy * 2.6) * 0.12;
          s.bassHold = bassOn ? Math.min(100, s.bassHold + 1) : Math.max(0, s.bassHold - 0.5);
          s.altoHold = altoOn ? Math.min(100, s.altoHold + 1) : Math.max(0, s.altoHold - 0.5);
          s.sopranoHold = sopranoOn ? Math.min(100, s.sopranoHold + 1) : Math.max(0, s.sopranoHold - 0.5);
          s.bassMidi = this.partCurrentMidi.bass;
          s.altoMidi = this.partCurrentMidi.alto;
          s.sopranoMidi = this.partCurrentMidi.soprano;
          s.bassHueTarget = 188 + (this.partCurrentMidi.bass - 43) * 1.6;
          s.altoHueTarget = 244 + (this.partCurrentMidi.alto - 55) * 1.2;
          s.sopranoHueTarget = 298 + (this.partCurrentMidi.soprano - 60) * 1.0;
          s.bassHue = s.bassHue * 0.94 + s.bassHueTarget * 0.06;
          s.altoHue = s.altoHue * 0.94 + s.altoHueTarget * 0.06;
          s.sopranoHue = s.sopranoHue * 0.94 + s.sopranoHueTarget * 0.06;
          for (let i = 0; i < output.length; i++) output[i] = Math.tanh(output[i] * this.masterAmp);
          this.messageCountdown--;
          if (this.messageCountdown <= 0) {
            this.messageCountdown = 6;
            this.port.postMessage({ type: 'visualState', state: s });
          }
          return true;
        }
      }
      registerProcessor('ambient-organ-processor', AmbientOrganProcessor);
    `;

    class OrganComposer {
      constructor(audioContext, outputNode = null, statusEl = null) {
        this.audioContext = audioContext;
        this.outputNode = outputNode;
        this.statusEl = statusEl;
        this.isRunning = false;
        this.schedulerTimers = new Set();
        this.workletNode = null;
        this.processorNode = null;
        this.usingFallback = false;
        this.visualState = { bass: 0, alto: 0, soprano: 0, bassMidi: 48, altoMidi: 64, sopranoMidi: 67, bassHold: 0, altoHold: 0, sopranoHold: 0, bassHueTarget: 190, altoHueTarget: 245, sopranoHueTarget: 300, bassHue: 190, altoHue: 245, sopranoHue: 300 };
        this.partCurrentMidi = { bass: 48, alto: 64, soprano: 67 };
        this.phraseState = this.makePhraseState();
      }

      makePhraseState() {
        return {
          currentChord: "I",
          prevChord: "I",
          phrasePos: 0,
          lastMotionBass: 0,
          lastMotionAlto: 0,
          lastMotionSoprano: 0,
          seqActive: false,
          seqStep: 0,
          seqLength: 0,
          seqTemplate: null,
          seqOriginChord: null,
          seqDirection: 0,
          cadenceBias: 0.0,
          sustainBias: 1.0,
          activityBias: 1.0,
          sequenceBias: 1.0,
          passingBias: 1.0,
          postPhrasePauseBeats: 0.0,
          cadencePauseBeats: 0.0,
          finalTonicHoldBeats: 1.0,
          sequenceCooldown: 0,
          strongSequenceMode: false,
          themePhraseIndex: 0,
          themeTotalPhrases: 10,
          themeSection: "intro",
          themeRestartPauseSec: 0.75,
        };
      }

      async ensureWorklet() {
        if (this.processorNode) return;

        const target = this.outputNode || this.audioContext.destination;
        const sourceUtf8 = unescape(encodeURIComponent(workletSource));
        const dataUrl = `data:application/javascript;base64,${btoa(sourceUtf8)}`;

        try {
          await this.audioContext.audioWorklet.addModule(dataUrl);
          const node = new AudioWorkletNode(this.audioContext, 'ambient-organ-processor', {
            outputChannelCount: [1],
            processorOptions: {
              masterAmp: MASTER_AMP,
              attackStep: ATTACK_STEP,
              releaseStep: RELEASE_STEP,
              releaseCurvePower: RELEASE_CURVE_POWER,
            },
          });
          node.port.onmessage = (event) => {
            if (event.data?.type === 'visualState') this.visualState = { ...event.data.state };
          };
          node.connect(target);
          this.workletNode = node;
          this.processorNode = node;
          this.usingFallback = false;
          return;
        } catch (error) {
          console.warn('AudioWorklet load failed, switching to ScriptProcessor fallback.', error);
          this.statusEl && (this.statusEl.textContent = 'fallback mode: script processor');
        }

        const bufferSize = DEVICE_PROFILE.mobile ? 2048 : 1024;
        const node = this.audioContext.createScriptProcessor(bufferSize, 0, 1);
        const parts = {
          bass: { phase: 0, env: 0, midi: 48, active: true },
          alto: { phase: 0, env: 0, midi: 64, active: true },
          soprano: { phase: 0, env: 0, midi: 67, active: true },
        };
        const partMeta = {
          bass: { baseHue: 190, hueRange: 22 },
          alto: { baseHue: 245, hueRange: 18 },
          soprano: { baseHue: 300, hueRange: 16 },
        };
        const sampleRate = this.audioContext.sampleRate;
        const shimmer = { phase: 0 };
        const updateVisuals = () => {
          const next = { ...this.visualState };
          for (const [name, part] of Object.entries(parts)) {
            const meta = partMeta[name];
            next[name] = part.env;
            next[`${name}Midi`] = part.midi;
            next[`${name}Hold`] = part.env > 0.04 ? Math.min(600, (next[`${name}Hold`] || 0) + 1) : Math.max(0, (next[`${name}Hold`] || 0) - 8);
            next[`${name}HueTarget`] = meta.baseHue + (part.midi % 12) * meta.hueRange / 12;
            next[`${name}Hue`] = next[`${name}Hue`] + (next[`${name}HueTarget`] - next[`${name}Hue`]) * 0.12;
          }
          this.visualState = next;
        };
        let visCounter = 0;
        node.onaudioprocess = (event) => {
          const out = event.outputBuffer.getChannelData(0);
          for (let i = 0; i < out.length; i += 1) {
            let mix = 0;
            for (const [name, part] of Object.entries(parts)) {
              const freq = midiToFreq(part.midi);
              part.env += (part.active ? ATTACK_STEP : -RELEASE_STEP);
              if (part.env < 0) part.env = 0;
              if (part.env > 1) part.env = 1;
              part.phase += freq / sampleRate;
              if (part.phase >= 1) part.phase -= 1;
              const p = part.phase;
              const fundamental = Math.sin(p * Math.PI * 2);
              const octave = Math.sin(p * Math.PI * 4) * 0.24;
              const twelfth = Math.sin(p * Math.PI * 6) * 0.10;
              const slightDetune = Math.sin((p * 1.003 + (name === 'alto' ? 0.17 : name === 'soprano' ? 0.31 : 0.0)) * Math.PI * 2) * 0.08;
              const voice = (fundamental * 0.82 + octave + twelfth + slightDetune) * Math.pow(part.env, 0.85);
              mix += voice;
            }
            shimmer.phase += 0.19 / sampleRate;
            if (shimmer.phase >= 1) shimmer.phase -= 1;
            mix += Math.sin(shimmer.phase * Math.PI * 2) * 0.004;
            out[i] = Math.tanh(mix * MASTER_AMP * 1.6);
          }
          visCounter += 1;
          if (visCounter >= 3) {
            visCounter = 0;
            updateVisuals();
          }
        };
        node._control = {
          setPartNote: (part, midi) => {
            if (!parts[part]) return;
            parts[part].midi = midi;
            parts[part].active = true;
          },
          releaseAll: () => {
            for (const part of Object.values(parts)) part.active = false;
          },
          reset: () => {
            for (const [name, part] of Object.entries(parts)) {
              part.phase = 0;
              part.env = 0;
              part.active = true;
              part.midi = name === 'bass' ? 48 : name === 'alto' ? 64 : 67;
            }
            this.visualState = { bass: 0, alto: 0, soprano: 0, bassMidi: 48, altoMidi: 64, sopranoMidi: 67, bassHold: 0, altoHold: 0, sopranoHold: 0, bassHueTarget: 190, altoHueTarget: 245, sopranoHueTarget: 300, bassHue: 190, altoHue: 245, sopranoHue: 300 };
          },
        };
        node.connect(target);
        this.processorNode = node;
        this.usingFallback = true;
      }

      sleep(sec) {
        return new Promise(resolve => {
          const id = setTimeout(() => {
            this.schedulerTimers.delete(id);
            resolve();
          }, sec * 1000);
          this.schedulerTimers.add(id);
        });
      }

      clearTimers() {
        for (const id of this.schedulerTimers) clearTimeout(id);
        this.schedulerTimers.clear();
      }

      setPartNote(part, midi) {
        this.partCurrentMidi[part] = midi;
        if (this.workletNode) {
          this.workletNode.port.postMessage({ type: 'setPartNote', part, midi });
        } else {
          this.processorNode?._control?.setPartNote(part, midi);
        }
      }

      releaseAllVoices() {
        if (this.workletNode) {
          this.workletNode.port.postMessage({ type: 'releaseAll' });
        } else {
          this.processorNode?._control?.releaseAll();
        }
      }

      updateThemeSection() {
        const idx = this.phraseState.themePhraseIndex;
        if (idx <= 1) {
          this.phraseState.themeSection = "intro";
          this.phraseState.sustainBias = 1.65;
          this.phraseState.activityBias = 0.78;
          this.phraseState.sequenceBias = 0.70;
          this.phraseState.passingBias = 0.82;
        } else if (idx <= 4) {
          this.phraseState.themeSection = "unfolding";
          this.phraseState.sustainBias = 1.08;
          this.phraseState.activityBias = 1.05;
          this.phraseState.sequenceBias = 1.08;
          this.phraseState.passingBias = 1.00;
        } else if (idx <= 7) {
          this.phraseState.themeSection = "meditation";
          this.phraseState.sustainBias = 0.92;
          this.phraseState.activityBias = 1.22;
          this.phraseState.sequenceBias = 1.32;
          this.phraseState.passingBias = 1.18;
        } else {
          this.phraseState.themeSection = "closing";
          this.phraseState.sustainBias = 1.72;
          this.phraseState.activityBias = 0.72;
          this.phraseState.sequenceBias = 0.62;
          this.phraseState.passingBias = 0.70;
        }
      }

      cadencePlan(indexInPhrase) {
        if (indexInPhrase < 26) return null;
        if (indexInPhrase < 28) return "ii";
        if (indexInPhrase < 30) return "V";
        return "I";
      }

      updatePhraseBiases() {
        const pos = this.phraseState.phrasePos;
        const baseSustain = this.phraseState.sustainBias;
        if (pos < 8) {
          this.phraseState.cadenceBias = 0.0;
          this.phraseState.sustainBias = baseSustain * 1.10;
        } else if (pos < 18) {
          this.phraseState.cadenceBias = 0.0;
          this.phraseState.sustainBias = baseSustain * 0.98;
        } else if (pos < 26) {
          this.phraseState.cadenceBias = 0.25;
          this.phraseState.sustainBias = baseSustain * 0.92;
        } else {
          this.phraseState.cadenceBias = 1.0;
          this.phraseState.sustainBias = baseSustain * 1.18;
        }
        if (this.phraseState.themeSection === "closing") this.phraseState.cadenceBias *= 1.25;
        else if (this.phraseState.themeSection === "meditation") this.phraseState.cadenceBias *= 0.92;
      }

      maybeStartSequence(currentChord) {
        if (this.phraseState.seqActive || this.phraseState.sequenceCooldown > 0) return;
        const pos = this.phraseState.phrasePos;
        if (pos >= 22) return;
        const baseProb = (pos >= 6 && pos <= 18) ? 0.18 : 0.10;
        const startProb = baseProb * this.phraseState.sequenceBias;
        if (Math.random() < startProb) {
          this.phraseState.seqActive = true;
          this.phraseState.seqStep = 0;
          if (this.phraseState.themeSection === "meditation") {
            this.phraseState.seqLength = [3, 4, 4, 5][Math.floor(Math.random() * 4)];
            this.phraseState.strongSequenceMode = Math.random() < 0.88;
          } else if (this.phraseState.themeSection === "closing") {
            this.phraseState.seqLength = [2, 2, 3][Math.floor(Math.random() * 3)];
            this.phraseState.strongSequenceMode = Math.random() < 0.45;
          } else {
            this.phraseState.seqLength = [2, 3, 4][Math.floor(Math.random() * 3)];
            this.phraseState.strongSequenceMode = Math.random() < 0.72;
          }
          this.phraseState.seqOriginChord = currentChord;
          this.phraseState.seqDirection = Math.random() < 0.5 ? -1 : 1;
          this.phraseState.seqTemplate = chooseSequencePattern();
        }
      }

      maybeStopSequence() {
        if (!this.phraseState.seqActive) return;
        if (this.phraseState.seqStep >= this.phraseState.seqLength) {
          this.phraseState.seqActive = false;
          this.phraseState.seqStep = 0;
          this.phraseState.seqLength = 0;
          this.phraseState.seqTemplate = null;
          this.phraseState.seqOriginChord = null;
          this.phraseState.seqDirection = 0;
          this.phraseState.strongSequenceMode = false;
          this.phraseState.sequenceCooldown = this.phraseState.themeSection === "meditation"
            ? [2, 3, 4][Math.floor(Math.random() * 3)]
            : [4, 5, 6, 7][Math.floor(Math.random() * 4)];
        }
      }

      chooseNextChord(currentChord, phrasePos) {
        const cad = this.cadencePlan(phrasePos);
        if (cad) return cad;
        let options;
        if (this.phraseState.seqActive && this.phraseState.strongSequenceMode) {
          options = { I: ["ii", "IV"], ii: ["V", "IV"], IV: ["V", "ii"], V: ["I", "vi"], vi: ["ii", "IV"], iii: ["vi", "IV"] }[currentChord] || CHORD_TRANSITIONS[currentChord];
        } else if (this.phraseState.seqActive) {
          options = { I: ["ii", "IV", "V"], ii: ["V", "IV"], iii: ["vi", "IV"], IV: ["ii", "V", "I"], V: ["I", "vi"], vi: ["ii", "IV"] }[currentChord] || CHORD_TRANSITIONS[currentChord];
        } else {
          options = CHORD_TRANSITIONS[currentChord];
        }
        const weights = options.map((ch) => {
          let w = 1.0;
          if (ch === currentChord) w *= 0.72;
          if (ch === "V") w *= 1.18;
          if (ch === "I") w *= 1.12;
          if (ch === "iii") w *= 0.28;
          if (phrasePos >= 20 && ["ii", "V", "I"].includes(ch)) w *= 1.25;
          if (this.phraseState.seqActive && ["ii", "IV", "V"].includes(ch)) w *= 1.15;
          const section = this.phraseState.themeSection;
          if (section === "intro") {
            if (["I", "IV", "V"].includes(ch)) w *= 1.12;
            if (ch === "vi") w *= 0.86;
          } else if (section === "unfolding") {
            if (["ii", "IV", "V"].includes(ch)) w *= 1.10;
          } else if (section === "meditation") {
            if (["ii", "IV", "vi", "V"].includes(ch)) w *= 1.16;
            if (ch === "I") w *= 0.92;
          } else if (section === "closing") {
            if (["I", "V"].includes(ch)) w *= 1.25;
            if (["ii", "vi"].includes(ch)) w *= 0.85;
          }
          return w;
        });
        return weightedChoice(options, weights);
      }

      chooseBass(prevMidi, chordName) {
        const candidates = chordToneMidis(chordName, ...BASS_RANGE);
        const rootDegree = CHORD_ROOT[chordName];
        const rootCandidates = degreeToAllMidisInRange(rootDegree, ...BASS_RANGE);
        const weights = candidates.map((c) => {
          const leap = Math.abs(c - prevMidi);
          let w = 0.7;
          if (rootCandidates.includes(c)) w *= 1.55;
          if (c === prevMidi) w *= 0.42 * this.phraseState.sustainBias;
          else if (leap <= 2) w *= 0.55;
          else if (leap <= 4) w *= 0.82;
          else if (leap <= 7) w *= 1.45;
          else if (leap <= 12) w *= 2.15;
          else w *= 0.72;
          if (leap === 7 || leap === 12) w *= 1.22;
          const lastMotion = this.phraseState.lastMotionBass;
          if (lastMotion > 0 && c > prevMidi) w *= 0.88;
          else if (lastMotion < 0 && c < prevMidi) w *= 0.88;
          if (this.phraseState.themeSection === "closing" && leap > 12) w *= 0.65;
          if (this.phraseState.themeSection === "meditation" && leap >= 5 && leap <= 12) w *= 1.16;
          if (this.phraseState.themeSection === "intro" && leap >= 7) w *= 1.10;
          return w;
        });
        let chosen = weightedChoice(candidates, weights);
        if (this.phraseState.seqActive && this.phraseState.seqTemplate) {
          const template = this.phraseState.seqTemplate.bass;
          const shift = template[Math.min(1, this.phraseState.seqStep % 2)] * this.phraseState.seqDirection;
          chosen = shiftByScaleSteps(chosen, shift, BASS_SCALE);
        }
        return chosen;
      }

      chooseUpper(prevMidi, chordName, low, high, lowerVoicePrev, lowerVoiceNow, upperLimit = null, partName = "alto") {
        const candidates = chordToneMidis(chordName, low, high);
        let filtered = candidates.filter((c) => c > lowerVoiceNow + 2 && (upperLimit === null || c < upperLimit - 2));
        if (!filtered.length) filtered = candidates;
        const nearby = nearestCandidates(filtered, prevMidi, 10);
        const weights = nearby.map((c) => {
          const leap = Math.abs(c - prevMidi);
          const icLow = intervalClass(c, lowerVoiceNow);
          let w = 1 / (1 + leap);
          if (leap === 0) w *= 1.35 * this.phraseState.sustainBias;
          else if (leap <= 2) w *= 2.8;
          else if (leap <= 4) w *= 1.5;
          else if (leap <= 7) w *= 0.75;
          else w *= 0.28;
          if ([3, 4, 8, 9].includes(icLow)) w *= 2.0;
          else if (icLow === 7) w *= 0.95;
          else if (icLow === 0) w *= 0.72;
          else w *= 0.8;
          w *= contraryMotionBonus(c, prevMidi, lowerVoicePrev, lowerVoiceNow);
          const lastMotion = partName === "alto" ? this.phraseState.lastMotionAlto : this.phraseState.lastMotionSoprano;
          if (lastMotion > 0 && c > prevMidi) w *= 0.86;
          else if (lastMotion < 0 && c < prevMidi) w *= 0.86;
          if (this.phraseState.themeSection === "closing" && leap > 4) w *= 0.68;
          if (this.phraseState.themeSection === "meditation" && leap >= 2 && leap <= 5) w *= 1.14;
          return w;
        });
        let chosen = weightedChoice(nearby, weights);
        if (this.phraseState.seqActive && this.phraseState.seqTemplate) {
          const template = this.phraseState.seqTemplate[partName];
          const shift = template[Math.min(1, this.phraseState.seqStep % 2)] * this.phraseState.seqDirection;
          const scale = partName === "alto" ? ALTO_SCALE : SOP_SCALE;
          chosen = shiftByScaleSteps(chosen, shift, scale);
        }
        return chosen;
      }

      makeMelodicTwoHalfNotes(prev, target, lowerNow, voiceScale) {
        const cadenceZone = this.phraseState.phrasePos >= 26;
        const strongSeq = this.phraseState.seqActive && this.phraseState.strongSequenceMode;
        if (strongSeq && Math.random() < (0.65 * this.phraseState.passingBias)) {
          const p = maybePassingTone(prev, target, voiceScale);
          if (p !== null) return [p, target];
        }
        if (Math.random() < (cadenceZone ? 0.28 : 0.14)) {
          const sus = maybeSuspension(prev, target, lowerNow);
          if (sus !== null) return [sus, target];
        }
        let passProb = (cadenceZone ? 0.22 : 0.40) * this.phraseState.passingBias;
        if (strongSeq) passProb = Math.max(passProb, 0.58 * this.phraseState.passingBias);
        if (Math.random() < passProb) {
          const p = maybePassingTone(prev, target, voiceScale);
          if (p !== null) return [p, target];
        }
        if (Math.random() < 0.22 * this.phraseState.sustainBias) return [prev, target];
        return [target, target];
      }

      smoothParallelCheck(plan) {
        let [b1, b2] = plan.bass;
        let [a1, a2] = plan.alto;
        let [s1, s2] = plan.soprano;
        const prevB = this.partCurrentMidi.bass;
        const prevA = this.partCurrentMidi.alto;
        const prevS = this.partCurrentMidi.soprano;
        const isParallelPerfect = (xPrev, yPrev, xNow, yNow) => {
          const oldIc = intervalClass(xPrev, yPrev);
          const newIc = intervalClass(xNow, yNow);
          const perfectOld = oldIc === 0 || oldIc === 7;
          const perfectNew = newIc === 0 || newIc === 7;
          const motionX = xNow - xPrev;
          const motionY = yNow - yPrev;
          const sameDir = (motionX > 0 && motionY > 0) || (motionX < 0 && motionY < 0);
          return perfectOld && perfectNew && sameDir && motionX !== 0 && motionY !== 0;
        };
        if (isParallelPerfect(prevB, prevA, b2, a2)) {
          const candidates = chordToneMidis(this.phraseState.currentChord, ...ALTO_RANGE).filter(c => c > b2 + 2);
          if (candidates.length) {
            const a2New = candidates.reduce((best, x) => Math.abs(x - a2) < Math.abs(best - a2) ? x : best, candidates[0]);
            a1 = Math.abs(a1 - a2New) <= 4 ? a1 : a2New;
            a2 = a2New;
          }
        }
        if (isParallelPerfect(prevA, prevS, a2, s2)) {
          const candidates = chordToneMidis(this.phraseState.currentChord, ...SOP_RANGE).filter(c => c > a2 + 2);
          if (candidates.length) {
            const s2New = candidates.reduce((best, x) => Math.abs(x - s2) < Math.abs(best - s2) ? x : best, candidates[0]);
            s1 = Math.abs(s1 - s2New) <= 4 ? s1 : s2New;
            s2 = s2New;
          }
        }
        if (a1 <= b1 + 2) a1 = ALTO_SCALE.reduce((best, x) => Math.abs(x - Math.max(b1 + 4, a1)) < Math.abs(best - Math.max(b1 + 4, a1)) ? x : best, ALTO_SCALE[0]);
        if (a2 <= b2 + 2) a2 = ALTO_SCALE.reduce((best, x) => Math.abs(x - Math.max(b2 + 4, a2)) < Math.abs(best - Math.max(b2 + 4, a2)) ? x : best, ALTO_SCALE[0]);
        if (s1 <= a1 + 2) s1 = SOP_SCALE.reduce((best, x) => Math.abs(x - Math.max(a1 + 4, s1)) < Math.abs(best - Math.max(a1 + 4, s1)) ? x : best, SOP_SCALE[0]);
        if (s2 <= a2 + 2) s2 = SOP_SCALE.reduce((best, x) => Math.abs(x - Math.max(a2 + 4, s2)) < Math.abs(best - Math.max(a2 + 4, s2)) ? x : best, SOP_SCALE[0]);
        plan.alto = [a1, a2];
        plan.soprano = [s1, s2];
      }

      buildBeatPlan(chordName) {
        const bassPrev = this.partCurrentMidi.bass;
        const altoPrev = this.partCurrentMidi.alto;
        const sopPrev = this.partCurrentMidi.soprano;
        const bassTarget = this.chooseBass(bassPrev, chordName);
        const altoTarget = this.chooseUpper(altoPrev, chordName, ...ALTO_RANGE, bassPrev, bassTarget, sopPrev + 12, "alto");
        const sopTarget = this.chooseUpper(sopPrev, chordName, ...SOP_RANGE, altoPrev, altoTarget, null, "soprano");
        let bassFirst = bassTarget;
        let bassSecond = bassTarget;
        const bassPassProb = 0.09 * this.phraseState.activityBias;
        const bassHoldProb = 0.18 * this.phraseState.sustainBias;
        if (Math.random() < bassPassProb) {
          const p = maybePassingTone(bassPrev, bassTarget, BASS_SCALE);
          if (p !== null) { bassFirst = p; bassSecond = bassTarget; }
        } else if (Math.random() < bassHoldProb) {
          bassFirst = bassPrev;
          bassSecond = bassTarget;
        }
        let [altoFirst, altoSecond] = this.makeMelodicTwoHalfNotes(altoPrev, altoTarget, bassTarget, ALTO_SCALE);
        let [sopFirst, sopSecond] = this.makeMelodicTwoHalfNotes(sopPrev, sopTarget, altoTarget, SOP_SCALE);
        if (this.phraseState.themeSection === "intro" && this.phraseState.themePhraseIndex === 0 && this.phraseState.phrasePos < 8) {
          bassFirst = bassPrev;
          bassSecond = bassTarget;
          if (Math.random() < 0.60) altoFirst = altoPrev;
          if (Math.random() < 0.60) sopFirst = sopPrev;
        }
        if (this.phraseState.themeSection === "meditation") {
          if (Math.random() < 0.18) {
            const p = maybePassingTone(altoPrev, altoTarget, ALTO_SCALE);
            if (p !== null) [altoFirst, altoSecond] = [p, altoTarget];
          }
          if (Math.random() < 0.22) {
            const p = maybePassingTone(sopPrev, sopTarget, SOP_SCALE);
            if (p !== null) [sopFirst, sopSecond] = [p, sopTarget];
          }
        }
        if (this.phraseState.phrasePos >= 30 && chordName === "I" && Math.random() < 0.68) {
          bassFirst = bassTarget;
          bassSecond = bassTarget;
          altoFirst = Math.random() < 0.40 ? altoPrev : altoTarget;
          altoSecond = altoTarget;
          sopFirst = Math.random() < 0.45 ? sopPrev : sopTarget;
          sopSecond = sopTarget;
        }
        if (this.phraseState.themeSection === "closing" && this.phraseState.themePhraseIndex >= this.phraseState.themeTotalPhrases - 2 && this.phraseState.phrasePos >= 24) {
          if (Math.random() < 0.55) bassFirst = bassPrev;
          if (Math.random() < 0.48) altoFirst = altoPrev;
          if (Math.random() < 0.48) sopFirst = sopPrev;
        }
        const plan = { bass: [bassFirst, bassSecond], alto: [altoFirst, altoSecond], soprano: [sopFirst, sopSecond] };
        this.smoothParallelCheck(plan);
        return plan;
      }

      async playBeat(beatNotes) {
        if (!this.isRunning) return;
        this.setPartNote('bass', beatNotes.bass[0]);
        this.setPartNote('alto', beatNotes.alto[0]);
        this.setPartNote('soprano', beatNotes.soprano[0]);
        await this.sleep(BEAT_SEC / 2);
        if (!this.isRunning) return;
        this.setPartNote('bass', beatNotes.bass[1]);
        this.setPartNote('alto', beatNotes.alto[1]);
        this.setPartNote('soprano', beatNotes.soprano[1]);
        await this.sleep(BEAT_SEC / 2);
      }

      updateMotionMemory(beatPlan) {
        this.phraseState.lastMotionBass = beatPlan.bass[1] - beatPlan.bass[0];
        this.phraseState.lastMotionAlto = beatPlan.alto[1] - beatPlan.alto[0];
        this.phraseState.lastMotionSoprano = beatPlan.soprano[1] - beatPlan.soprano[0];
      }

      updateFinalTonicHold(beatPlan) {
        if (this.phraseState.currentChord !== 'I') { this.phraseState.finalTonicHoldBeats = 0.0; return; }
        const bassSame = beatPlan.bass[0] === beatPlan.bass[1];
        const altoSame = beatPlan.alto[0] === beatPlan.alto[1];
        const sopSame = beatPlan.soprano[0] === beatPlan.soprano[1];
        this.phraseState.finalTonicHoldBeats += bassSame && altoSame && sopSame ? 1.0 : 0.5;
      }

      maybeScheduleCadencePause() {
        this.phraseState.cadencePauseBeats = 0.0;
        const prevChord = this.phraseState.prevChord;
        const currentChord = this.phraseState.currentChord;
        const pos = this.phraseState.phrasePos;
        const section = this.phraseState.themeSection;
        if (prevChord === 'V' && currentChord === 'I') {
          let baseProb = 0.0;
          if (pos >= 8 && pos <= 24) baseProb = 0.28;
          else if (pos >= 25 && pos <= 29) baseProb = 0.55;
          else if (pos >= 30) baseProb = 0.72;
          if (section === 'intro') baseProb *= 0.8;
          else if (section === 'meditation') baseProb *= 1.12;
          else if (section === 'closing') baseProb *= 1.25;
          if (Math.random() < baseProb) {
            this.phraseState.cadencePauseBeats = pos >= 28
              ? [0.75, 1.0, 1.25][Math.floor(Math.random() * 3)]
              : [0.5, 0.75, 1.0][Math.floor(Math.random() * 3)];
          }
        }
      }

      async consumeCadencePause() {
        if (this.phraseState.cadencePauseBeats > 0) await this.sleep(BEAT_SEC * this.phraseState.cadencePauseBeats);
        this.phraseState.cadencePauseBeats = 0.0;
      }

      maybeSchedulePostPhrasePause() {
        if (this.phraseState.currentChord !== 'I') { this.phraseState.postPhrasePauseBeats = 0.0; return; }
        const hold = this.phraseState.finalTonicHoldBeats;
        const section = this.phraseState.themeSection;
        let pause = 0.0;
        if (hold >= 2.0) { if (Math.random() < 0.82) pause = [1.0, 1.0, 1.5, 2.0][Math.floor(Math.random() * 4)]; }
        else if (hold >= 1.5) { if (Math.random() < 0.68) pause = [0.75, 1.0, 1.5][Math.floor(Math.random() * 3)]; }
        else if (hold >= 1.0) { if (Math.random() < 0.48) pause = [0.5, 0.75, 1.0][Math.floor(Math.random() * 3)]; }
        else if (Math.random() < 0.22) pause = [0.5, 0.75][Math.floor(Math.random() * 2)];
        if (section === 'closing' && pause > 0) pause += [0.0, 0.5][Math.floor(Math.random() * 2)];
        this.phraseState.postPhrasePauseBeats = pause;
      }

      async consumePostPhrasePause() {
        if (this.phraseState.postPhrasePauseBeats > 0) await this.sleep(BEAT_SEC * this.phraseState.postPhrasePauseBeats);
        this.phraseState.postPhrasePauseBeats = 0.0;
      }

      resetPhraseLevelState() {
        this.phraseState.seqActive = false;
        this.phraseState.seqStep = 0;
        this.phraseState.seqLength = 0;
        this.phraseState.seqTemplate = null;
        this.phraseState.seqOriginChord = null;
        this.phraseState.seqDirection = 0;
        this.phraseState.strongSequenceMode = false;
        this.phraseState.lastMotionBass = 0;
        this.phraseState.lastMotionAlto = 0;
        this.phraseState.lastMotionSoprano = 0;
        this.phraseState.finalTonicHoldBeats = 1.0;
        this.phraseState.cadencePauseBeats = 0.0;
      }

      resetThemeCycle() {
        this.phraseState.themePhraseIndex = 0;
        this.updateThemeSection();
        this.resetPhraseLevelState();
      }

      async playThemeRestartCadence() {
        this.setPartNote('bass', 48);
        this.setPartNote('alto', 64);
        this.setPartNote('soprano', 67);
        await this.sleep(BEAT_SEC * 1.25);
        this.releaseAllVoices();
        await this.sleep(this.phraseState.themeRestartPauseSec);
      }

      async composerLoop() {
        let currentChord = 'I';
        let phrasePos = 0;
        this.updateThemeSection();
        this.setPartNote('bass', 48);
        this.setPartNote('alto', 64);
        this.setPartNote('soprano', 67);
        await this.sleep(BEAT_SEC * 1.1);
        while (this.isRunning) {
          this.phraseState.prevChord = currentChord;
          this.phraseState.phrasePos = phrasePos;
          this.updateThemeSection();
          this.updatePhraseBiases();
          this.maybeStartSequence(currentChord);
          const nextChord = this.chooseNextChord(currentChord, phrasePos);
          this.phraseState.currentChord = nextChord;
          const beatPlan = this.buildBeatPlan(nextChord);
          await this.playBeat(beatPlan);
          if (!this.isRunning) break;
          this.updateMotionMemory(beatPlan);
          if (nextChord === 'I' && phrasePos >= 30) this.updateFinalTonicHold(beatPlan);
          else this.phraseState.finalTonicHoldBeats = 0.0;
          this.maybeScheduleCadencePause();
          await this.consumeCadencePause();
          if (!this.isRunning) break;
          if (this.phraseState.seqActive) {
            this.phraseState.seqStep += 1;
            this.maybeStopSequence();
          }
          if (this.phraseState.sequenceCooldown > 0 && !this.phraseState.seqActive) this.phraseState.sequenceCooldown -= 1;
          currentChord = nextChord;
          phrasePos += 1;
          if (phrasePos >= 32) {
            this.maybeSchedulePostPhrasePause();
            await this.consumePostPhrasePause();
            if (!this.isRunning) break;
            phrasePos = 0;
            currentChord = 'I';
            this.phraseState.themePhraseIndex += 1;
            if (this.phraseState.themePhraseIndex >= this.phraseState.themeTotalPhrases) {
              await this.playThemeRestartCadence();
              if (!this.isRunning) break;
              this.resetThemeCycle();
              this.setPartNote('bass', 48);
              this.setPartNote('alto', 64);
              this.setPartNote('soprano', 67);
              await this.sleep(BEAT_SEC * 0.9);
              if (!this.isRunning) break;
            } else {
              this.resetPhraseLevelState();
            }
          }
        }
      }

      getVisualState() { return this.visualState; }

      async start() {
        if (this.isRunning) return;
        await this.ensureWorklet();
        if (this.audioContext.state !== 'running') await this.audioContext.resume();
        this.isRunning = true;
        this.statusEl && (this.statusEl.textContent = this.usingFallback ? 'fallback mode: script processor' : (DEVICE_PROFILE.mobile ? 'mobile mode: audio worklet + light FX' : 'desktop mode'));
        this.composerLoop().catch((err) => { console.error(err); this.stop(); });
      }

      stop() {
        this.isRunning = false;
        this.clearTimers();
        this.releaseAllVoices();
        setTimeout(() => {
          this.partCurrentMidi = { bass: 48, alto: 64, soprano: 67 };
          this.visualState = { bass: 0, alto: 0, soprano: 0, bassMidi: 48, altoMidi: 64, sopranoMidi: 67, bassHold: 0, altoHold: 0, sopranoHold: 0, bassHueTarget: 190, altoHueTarget: 245, sopranoHueTarget: 300, bassHue: 190, altoHue: 245, sopranoHue: 300 };
          this.phraseState = this.makePhraseState();
          if (this.workletNode) {
            this.workletNode.port.postMessage({ type: 'reset' });
          } else {
            this.processorNode?._control?.reset();
          }
        }, 120);
      }
    }

    function setupFractalBackground(audioStateRef) {
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d', { alpha: true, desynchronized: true });
      let width = 0;
      let height = 0;
      let dpr = 1;
      let rafId = 0;
      let lastTs = 0;
      let lastDrawAt = 0;
      const smooth = { bass: 0, alto: 0, soprano: 0, bassHue: 190, altoHue: 245, sopranoHue: 300, bassHold: 0, altoHold: 0, sopranoHold: 0 };
      const mainCount = DEVICE_PROFILE.mobile ? 7 : 12;
      const sideCount = DEVICE_PROFILE.mobile ? 4 : 8;
      const perimeterStep = DEVICE_PROFILE.mobile ? 2 : 1;

      function isFullscreen() { return !!document.fullscreenElement; }
      function canAnimate() {
        if (DEVICE_PROFILE.visualThrottleWhenHidden && document.hidden) return false;
        return true;
      }
      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, DEVICE_PROFILE.maxDpr) * DEVICE_PROFILE.canvasQuality;
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.max(1, Math.floor(width * dpr));
        canvas.height = Math.max(1, Math.floor(height * dpr));
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      function softCircle(x, y, r, hue, alpha) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, `hsla(${hue}, 100%, 77%, ${alpha})`);
        g.addColorStop(0.3, `hsla(${hue}, 100%, 70%, ${alpha * 0.40})`);
        g.addColorStop(1, `hsla(${hue}, 100%, 60%, 0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      function getState() {
        const s = audioStateRef() || {};
        return {
          bass: s.bass || 0,
          alto: s.alto || 0,
          soprano: s.soprano || 0,
          bassHue: s.bassHue || 190,
          altoHue: s.altoHue || 245,
          sopranoHue: s.sopranoHue || 300,
          bassHold: s.bassHold || 0,
          altoHold: s.altoHold || 0,
          sopranoHold: s.sopranoHold || 0,
        };
      }
      function noiseWave(t, a, b, c) {
        return Math.sin(t * a + c) * 0.55 + Math.sin(t * b + c * 1.7) * 0.3 + Math.cos(t * (a * 0.63) + c * 0.9) * 0.15;
      }
      function drawBlob(x, y, radius, hue, alpha, wobble) {
        const pieces = DEVICE_PROFILE.mobile ? 2 : 4;
        for (let i = 0; i < pieces; i++) {
          const ang = wobble + i * 2.05;
          const ox = Math.cos(ang) * radius * (0.07 + i * 0.03);
          const oy = Math.sin(ang) * radius * (0.07 + i * 0.03);
          softCircle(x + ox, y + oy, radius * (1 - i * 0.18), hue + i * 3, alpha * (1 - i * 0.24));
        }
      }
      function drawWaveField(anchorX, anchorY, baseRadius, hue, energy, hold, t, seed, count, spreadX, spreadY) {
        for (let i = 0; i < count; i++) {
          const p = i / Math.max(1, count - 1);
          const localT = t + seed * 11 + i * 0.37;
          const wave1 = noiseWave(localT, 0.83, 1.47, seed + i * 0.7);
          const wave2 = noiseWave(localT, 0.61, 1.11, seed + i * 1.3);
          const wave3 = noiseWave(localT, 0.37, 0.91, seed + i * 2.1);
          const dx = wave1 * width * (0.04 + p * 0.13) * spreadX;
          const dy = wave2 * height * (0.03 + p * 0.11) * spreadY;
          const surf = 0.5 + 0.5 * Math.sin(t * 1.0 + seed * 3 + i * 0.9);
          const fade = surf * surf;
          const swell = 1 + 0.05 * noiseWave(localT, 1.1, 1.9, seed + i);
          const holdBoost = Math.min(0.12, hold * 0.0014);
          const radius = baseRadius * (0.38 + p * 0.52 + holdBoost) * swell;
          const alpha = (DEVICE_PROFILE.mobile ? 0.018 : 0.024) + energy * (DEVICE_PROFILE.mobile ? 0.04 : 0.06);
          drawBlob(
            anchorX + dx + Math.sin(t * (0.46 + p * 0.14) + seed + i) * width * 0.004,
            anchorY + dy + Math.cos(t * (0.43 + p * 0.12) + seed * 1.2 + i) * height * 0.004,
            radius,
            hue + wave3 * 7 + i,
            alpha * (0.54 + fade * 0.40) * (1 - p * 0.06),
            t * 0.9 + i + seed
          );
        }
      }
      function drawPerimeterField(t, total, bassHue, altoHue, sopranoHue) {
        const big = Math.max(width, height);
        const palette = [bassHue - 12, altoHue - 8, sopranoHue - 10, 140 + total * 24, 320 - total * 14, 210 + total * 18];
        const points = [
          [width * 0.08, height * 0.12, big * 0.09, palette[0], 0.03],
          [width * 0.50, height * 0.05, big * 0.085, palette[3], 0.028],
          [width * 0.88, height * 0.14, big * 0.09, palette[1], 0.028],
          [width * 0.95, height * 0.46, big * 0.095, palette[5], 0.03],
          [width * 0.90, height * 0.86, big * 0.092, palette[2], 0.028],
          [width * 0.50, height * 0.95, big * 0.084, palette[4], 0.026],
          [width * 0.10, height * 0.88, big * 0.09, palette[0], 0.026],
          [width * 0.04, height * 0.48, big * 0.095, palette[1], 0.03]
        ];
        for (let idx = 0; idx < points.length; idx += perimeterStep) {
          const [px, py, pr, hue, alpha] = points[idx];
          const driftX = noiseWave(t, 0.22 + idx * 0.03, 0.37 + idx * 0.02, idx + 0.4) * width * 0.028;
          const driftY = noiseWave(t, 0.18 + idx * 0.025, 0.33 + idx * 0.018, idx + 1.1) * height * 0.028;
          softCircle(px + driftX, py + driftY, pr * (0.92 + total * 0.10), hue, alpha + total * 0.008);
        }
      }
      function frame(ts) {
        rafId = requestAnimationFrame(frame);
        if (!canAnimate()) return;
        if (ts - lastDrawAt < DEVICE_PROFILE.animationIntervalMs) return;
        if (isFullscreen() && lastTs && ts - lastTs < (DEVICE_PROFILE.mobile ? 55 : 40)) return;
        lastDrawAt = ts;
        lastTs = ts;
        const t = ts * 0.00012;
        const s = getState();
        smooth.bass = smooth.bass * 0.97 + s.bass * 0.03;
        smooth.alto = smooth.alto * 0.97 + s.alto * 0.03;
        smooth.soprano = smooth.soprano * 0.97 + s.soprano * 0.03;
        smooth.bassHue = smooth.bassHue * 0.993 + s.bassHue * 0.007;
        smooth.altoHue = smooth.altoHue * 0.993 + s.altoHue * 0.007;
        smooth.sopranoHue = smooth.sopranoHue * 0.993 + s.sopranoHue * 0.007;
        smooth.bassHold = smooth.bassHold * 0.978 + s.bassHold * 0.022;
        smooth.altoHold = smooth.altoHold * 0.978 + s.altoHold * 0.022;
        smooth.sopranoHold = smooth.sopranoHold * 0.978 + s.sopranoHold * 0.022;
        const total = (smooth.bass + smooth.alto + smooth.soprano) / 3;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = isFullscreen() ? 'rgba(4, 6, 10, 0.18)' : 'rgba(4, 6, 10, 0.14)';
        ctx.fillRect(0, 0, width, height);
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const cx = width * 0.5;
        const cy = height * 0.5;
        const big = Math.max(width, height);
        const bassAnchorX = cx + noiseWave(t, 0.48, 0.82, 0.2) * width * 0.28;
        const bassAnchorY = cy + noiseWave(t, 0.42, 0.76, 0.9) * height * 0.21;
        const altoAnchorX = cx + noiseWave(t, 0.56, 0.92, 1.8) * width * 0.31;
        const altoAnchorY = cy + noiseWave(t, 0.46, 0.80, 1.2) * height * 0.22;
        const sopranoAnchorX = cx + noiseWave(t, 0.61, 0.97, 2.6) * width * 0.33;
        const sopranoAnchorY = cy + noiseWave(t, 0.51, 0.85, 2.1) * height * 0.24;
        const bassRadius = big * (0.060 + smooth.bass * 0.018 + Math.min(0.03, smooth.bassHold * 0.001));
        const altoRadius = big * (0.056 + smooth.alto * 0.017 + Math.min(0.028, smooth.altoHold * 0.001));
        const sopranoRadius = big * (0.052 + smooth.soprano * 0.016 + Math.min(0.027, smooth.sopranoHold * 0.001));
        drawWaveField(bassAnchorX, bassAnchorY, bassRadius * 1.12, smooth.bassHue, smooth.bass, smooth.bassHold, t, 0.3, mainCount, 1.18 + total * 0.24, 1.06 + total * 0.16);
        drawWaveField(altoAnchorX, altoAnchorY, altoRadius * 1.12, smooth.altoHue, smooth.alto, smooth.altoHold, t, 1.7, mainCount, 1.20 + total * 0.24, 1.08 + total * 0.16);
        drawWaveField(sopranoAnchorX, sopranoAnchorY, sopranoRadius * 1.10, smooth.sopranoHue, smooth.soprano, smooth.sopranoHold, t, 2.8, mainCount, 1.22 + total * 0.24, 1.10 + total * 0.16);
        drawWaveField(cx + noiseWave(t, 0.33, 0.57, 3.4) * width * 0.28, cy + noiseWave(t, 0.29, 0.51, 4.1) * height * 0.21, big * (0.028 + total * 0.008), 146 + total * 24, total * 0.48, (smooth.bassHold + smooth.altoHold + smooth.sopranoHold) / 3, t, 3.6, sideCount, 1.2, 1.08);
        if (!DEVICE_PROFILE.mobile) {
          drawWaveField(cx + noiseWave(t, 0.37, 0.62, 5.2) * width * 0.30, cy + noiseWave(t, 0.31, 0.55, 5.8) * height * 0.24, big * (0.028 + total * 0.008), 318 - total * 18, total * 0.46, (smooth.bassHold + smooth.altoHold + smooth.sopranoHold) / 3, t, 5.1, sideCount, 1.25, 1.1);
        }
        drawPerimeterField(t, total, smooth.bassHue, smooth.altoHue, smooth.sopranoHue);
        ctx.restore();
      }
      resize();
      window.addEventListener('resize', resize, { passive: true });
      document.addEventListener('fullscreenchange', resize);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) resize();
      });
      rafId = requestAnimationFrame(frame);
      return () => {
        cancelAnimationFrame(rafId);
        window.removeEventListener('resize', resize);
        document.removeEventListener('fullscreenchange', resize);
      };
    }

    const button = document.getElementById('toggleBtn');
    const fsBtn = document.getElementById('fsBtn');
    const wrap = document.getElementById('wrap');
    const statusEl = document.getElementById('status');

    let audioContext = null;
    let organ = null;
    let ambientFx = null;
    const destroyFractalBackground = setupFractalBackground(() => organ ? organ.getVisualState() : { bass: 0, alto: 0, soprano: 0 });

    async function ensureAudio() {
      if (audioContext) return;
      audioContext = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: DEVICE_PROFILE.mobile ? 'playback' : 'interactive', sampleRate: SAMPLE_RATE });
      ambientFx = setupAmbientFX(audioContext);
      organ = new OrganComposer(audioContext, ambientFx ? ambientFx.input : null, statusEl);
    }

    async function togglePlayback() {
      await ensureAudio();
      if (!organ.isRunning) {
        await organ.start();
        button.textContent = 'Stop';
        button.classList.add('stop');
      } else {
        organ.stop();
        button.textContent = 'Start';
        button.classList.remove('stop');
      }
    }

    button.addEventListener('click', () => { togglePlayback().catch(err => { console.error(err); statusEl.textContent = 'Audio start failed'; }); });

    fsBtn.addEventListener('click', async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen?.();
        wrap.style.display = 'none';
      }
    });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) wrap.style.display = 'block';
    });

    window.addEventListener('beforeunload', () => {
      if (ambientFx) ambientFx.stop();
      destroyFractalBackground && destroyFractalBackground();
    });
  </script>
</body>
</html>
